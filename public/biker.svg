<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 60" width="80" height="60">
  <g fill="#0b0b0f" stroke="#0b0b0f" stroke-linecap="round" stroke-linejoin="round">

    <!-- Dirt-jump / hardtail MTB frame -->
    <g fill="none" stroke-width="3">
      <path d="M16 46 L 36 40"/>        <!-- chain stay -->
      <path d="M16 46 L 38 28"/>        <!-- seat stay -->
      <path d="M36 40 L 38 28"/>        <!-- seat tube -->
      <path d="M36 40 L 52 32"/>        <!-- down tube -->
      <path d="M38 28 L 52 32"/>        <!-- top tube -->
      <!-- Suspension fork: two stanchions -->
      <path d="M52 32 L 64 46"/>
      <path d="M54 33 L 66 46" stroke-width="1.5"/>
    </g>

    <!-- Chainring -->
    <circle cx="36" cy="40" r="3.2" fill="none" stroke-width="1.2"/>
    <circle cx="36" cy="40" r="0.8"/>

    <!-- Short seat post + saddle -->
    <path d="M38 28 L 38 24" stroke-width="2.5"/>
    <ellipse cx="38" cy="23" rx="4" ry="1.3"/>

    <!-- Stem + flat bars -->
    <path d="M52 32 L 54 27" stroke-width="3"/>
    <path d="M49 27 L 59 27" stroke-width="3.5" stroke-linecap="round"/>

    <!-- RIDER — body parts connect to the three contact points:
         hip on saddle (38,23) → shoulder (50,18) → hand on grip (55,27)
         hip (38,23) → knee (43,33) → foot on pedal (38,40)
         head sits above/forward of shoulder so it reads as leaning over bars. -->

    <!-- spine from hip on saddle up-forward to shoulder -->
    <path d="M 38 23 Q 44 20, 50 18"
          stroke-width="9" stroke-linecap="round" fill="none"/>
    <!-- arm from shoulder down-forward to grip -->
    <path d="M 50 18 L 55 27"
          stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- head + helmet, positioned just forward of shoulder -->
    <ellipse cx="52" cy="11" rx="5" ry="5"/>
    <!-- thigh from hip down-forward to knee -->
    <path d="M 38 24 L 43 33"
          stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- shin from knee down-back to foot on pedal -->
    <path d="M 43 33 L 38 40"
          stroke-width="5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
