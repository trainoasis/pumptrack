<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <g fill="none" stroke="#0b0b0f" stroke-linecap="round">
    <!-- tire -->
    <circle cx="11" cy="11" r="10" stroke-width="2"/>
    <!-- disc rotor (rotates with the wheel) -->
    <circle cx="11" cy="11" r="5" stroke-width="0.7"/>
    <!-- spokes — 8-pointed so rotation reads clearly -->
    <path d="M11 2  L 11 20"/>
    <path d="M2  11 L 20 11"/>
    <path d="M4.3 4.3  L 17.7 17.7"/>
    <path d="M17.7 4.3 L 4.3  17.7"/>
  </g>
  <circle cx="11" cy="11" r="1.5" fill="#0b0b0f"/>
</svg>
