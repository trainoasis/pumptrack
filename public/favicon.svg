<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#122a4d"/>
  <!-- hill silhouette -->
  <path d="M0 54 Q 18 42, 32 50 T 64 44 L 64 64 L 0 64 Z" fill="#2d1b3d"/>
  <!-- wheels -->
  <circle cx="20" cy="46" r="8.5" fill="none" stroke="#ffd23f" stroke-width="3"/>
  <circle cx="44" cy="46" r="8.5" fill="none" stroke="#ffd23f" stroke-width="3"/>
  <!-- bike frame + fork + seatpost -->
  <path d="M20 46 L 30 30 L 44 46 M30 30 L 38 22 M20 46 L 24 22"
        fill="none" stroke="#ff6b6b" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- rider body arc (from handlebars to seat) -->
  <path d="M24 22 Q 32 12, 38 22"
        fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- rider head -->
  <circle cx="22" cy="14" r="3.5" fill="#ffffff"/>
</svg>
