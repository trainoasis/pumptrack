<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>pumptrack</title>
<style>
  html, body { margin: 0; padding: 0; background: #111; overflow: hidden;
               font-family: ui-monospace, Menlo, monospace; color: #eee; }
  canvas { display: block; }
  #hud  { position: fixed; top: 8px;    left: 12px; font-size: 14px; pointer-events: none;
          text-shadow: 0 1px 2px #000; }
  #help { position: fixed; bottom: 8px; left: 12px; font-size: 12px; opacity: 0.7;
          text-shadow: 0 1px 2px #000; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>
<div id="help">Hold SPACE / click / touch to dive. You have no uphill control — dive the <b>downhills</b> to build enough speed to clear the next hill. R to reset.</div>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const hud = document.getElementById('hud');

  let W, H;
  const resize = () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight; };
  resize(); addEventListener('resize', resize);

  // --- Levels ----------------------------------------------------------------
  // Each level: one sine [amplitude, freq, phase]. Starting vx fixed at 340.
  //   Launch threshold at a crest: s² > gAir / (A·f²).
  const LEVELS = [
    { name: 'Pump basics',  terrain: [[50, 0.0100, 1.70]] },  // period 628,  launch ~290
    { name: 'Long glides',  terrain: [[70, 0.0060, 1.70]] },  // period 1047, launch ~408 → must pump
    { name: 'Taller waves', terrain: [[95, 0.0060, 1.70]] },  // period 1047, launch ~350, but 190 unit height swings
  ];
  let currentLevel = 0;
  const BASELINE = 260;

  const terrainY     = x => { let y = BASELINE; for (const [A,f,p] of LEVELS[currentLevel].terrain) y += A     * Math.sin(f*x+p); return y; };
  const terrainSlope = x => { let s = 0;        for (const [A,f,p] of LEVELS[currentLevel].terrain) s += A*f   * Math.cos(f*x+p); return s; };
  const terrainYpp   = x => { let s = 0;        for (const [A,f,p] of LEVELS[currentLevel].terrain) s -= A*f*f * Math.sin(f*x+p); return s; };
  const terrainCurvature = x => {
    const yp = terrainSlope(x), ypp = terrainYpp(x);
    return ypp / Math.pow(1 + yp*yp, 1.5);
  };

  // --- Ball -------------------------------------------------------------------
  const ball = { x: 40, y: 0, vx: 340, vy: 0, r: 12, grounded: false };
  const reset = () => {
    ball.x = 40; ball.vx = 340; ball.vy = 0;
    ball.y = terrainY(ball.x) + 60;
    ball.grounded = false;
    bestSpeed = 0; maxDist = 0; stallT = 0;
    gameOver = false;
  };
  let bestSpeed = 0, maxDist = 0, stallT = 0, gameOver = false;
  reset();

  // --- Input ------------------------------------------------------------------
  let diving = false;
  const setDive = v => { diving = v; };
  // Clicks/taps on UI controls (e.g. the dev level picker) must not trigger dive.
  const isUiTarget = t => t && t.tagName === 'BUTTON';
  addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (gameOver) { reset(); return; }
      setDive(true);
    }
    if (e.code === 'KeyR') reset();
  });
  addEventListener('keyup',   e => { if (e.code === 'Space') { e.preventDefault(); setDive(false); } });
  addEventListener('mousedown', e => {
    if (isUiTarget(e.target)) return;
    if (gameOver) { reset(); return; }
    setDive(true);
  });
  addEventListener('mouseup',   () => setDive(false));
  addEventListener('touchstart', e => {
    if (isUiTarget(e.target)) return;
    e.preventDefault();
    if (gameOver) { reset(); return; }
    setDive(true);
  }, { passive: false });
  addEventListener('touchend',   e => { e.preventDefault(); setDive(false); }, { passive: false });

  // --- Physics constants ------------------------------------------------------
  // Tiny-Wings-style gravity: gentle default so the ball FLOATS when you're
  // not pressing, strong dive when you are. Grounded also responds to dive —
  // pressing on a downhill pumps extra speed; pressing on an uphill costs you.
  const G_AIR_FLOAT    = 420;   // airborne gravity, not diving — floaty
  const G_AIR_DIVE     = 2400;  // airborne gravity while holding — nose-dive
  const G_GROUND       = 900;   // rolling gravity, projected along slope
  const G_GROUND_DIVE  = 1700;  // rolling gravity while diving — pump on downhills
  const FRICTION       = 0.004;
  const STALL_SPD      = 40;    // below this for STALL_TIME seconds → auto-reset
  const STALL_TIME     = 1.2;

  // Fixed timestep keeps physics deterministic & identical across framerates
  const FIXED_DT = 1 / 240;
  let acc = 0, lastT = performance.now() / 1000;

  // Smoothed camera zoom. Zooms out with speed and altitude so you can always
  // see where you're going to land.
  let currentZoom = 1;

  function step(dt) {
    if (gameOver) return;
    const gAir    = diving ? G_AIR_DIVE    : G_AIR_FLOAT;
    const gGround = diving ? G_GROUND_DIVE : G_GROUND;

    if (ball.grounded) {
      const g = gGround;
      // Tangent at current position
      const slope = terrainSlope(ball.x);
      const L  = Math.sqrt(1 + slope*slope);
      const tx = 1 / L, ty = slope / L;

      // Speed along tangent (+x forward)
      let s = ball.vx * tx + ball.vy * ty;

      // Gravity projected onto tangent: (0,-g) · (tx,ty) = -g*ty
      s += (-g * ty) * dt;
      s -= FRICTION * s * dt;
      if (s < 0) s = 0;

      // Advance x, snap y to terrain, re-seat velocity along the NEW tangent
      ball.x += s * tx * dt;
      ball.y  = terrainY(ball.x);
      const slope2 = terrainSlope(ball.x);
      const L2 = Math.sqrt(1 + slope2*slope2);
      ball.vx = s / L2;
      ball.vy = s * slope2 / L2;

      // Launch check: at a hill crest (concave-down) the ball leaves the ground
      // when required centripetal s^2·|κ| exceeds gravity's normal component g·cosθ = g/L.
      // We test against the *airborne* gravity since that's what will act if the
      // ball flies — so the floaty feel also makes launches easier.
      const k = terrainCurvature(ball.x);
      if (k < 0 && s * s * (-k) > gAir / L2) {
        ball.grounded = false;
      }
    } else {
      // Airborne: simple gravity integration. Float when not pressing, dive when pressing.
      ball.vy -= gAir * dt;
      ball.x  += ball.vx * dt;
      ball.y  += ball.vy * dt;

      const gy = terrainY(ball.x);
      if (ball.y <= gy) {
        // Landing — KEY PHYSICS: project velocity onto slope tangent (no bounce).
        // Matching the slope preserves speed; mismatched angle sheds the normal
        // component, which is exactly the Tiny Wings "slide vs. splat" feel.
        ball.y = gy;
        ball.grounded = true;

        const slope = terrainSlope(ball.x);
        const L  = Math.sqrt(1 + slope*slope);
        const tx = 1 / L, ty = slope / L;
        let s = ball.vx * tx + ball.vy * ty;
        if (s < 0) s = 0;
        ball.vx = s * tx;
        ball.vy = s * ty;
      }
    }

    const spd = Math.hypot(ball.vx, ball.vy);
    if (spd > bestSpeed) bestSpeed = spd;
    if (ball.x > maxDist) maxDist = ball.x;

    // Stall → game over (player must press SPACE to restart).
    if (spd < STALL_SPD) stallT += dt; else stallT = 0;
    if (stallT > STALL_TIME) gameOver = true;
  }

  // --- Rendering --------------------------------------------------------------
  function draw() {
    const spd = Math.hypot(ball.vx, ball.vy);

    // Zoom is driven only by (a) grounded vs airborne, and (b) altitude over
    // the flat terrain midline — never by speed or the bobbing local ground
    // level. That keeps it wobble-free and predictable: out when you fly, in
    // when you land.
    let targetZoom = 1.0;
    if (!ball.grounded) {
      const h = Math.max(0, ball.y - BASELINE);
      const altN = Math.min(1, h / 350);
      targetZoom = 1.0 - altN * 0.40;  // 1.0 → 0.6
    }
    currentZoom += (targetZoom - currentZoom) * 0.05;
    const zoom = currentZoom;

    // Transform: screen = (world - cam) * zoom + anchor
    // sx = (wx - camX) * zoom + W/2
    // sy = (camY - wy) * zoom + H/2
    // Ball sits at ~30% from the left; ground pins at ~78% down screen.
    const camX = ball.x - (W * 0.30 - W/2) / zoom;      // = ball.x + 0.20*W/zoom
    // Anchor vertically to the terrain midline (BASELINE), not to the ground
    // directly under the ball — otherwise the hills wobble on screen as the
    // ball rolls over them. Hills oscillate ±A·zoom around the pinned midline.
    const camYGround = BASELINE + (H * 0.78 - H/2) / zoom;
    // When the ball flies high, lift the camera so the ball stays at ≤ 0.25H from the top.
    const camYBall = ball.y - (H/2 - H * 0.25) / zoom;
    const camY = Math.max(camYGround, camYBall);

    const toSX = wx => (wx - camX) * zoom + W / 2;
    const toSY = wy => (camY - wy) * zoom + H / 2;

    // Sky
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#122a4d');
    sky.addColorStop(1, '#f4a259');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // Terrain — sample enough world span to cover the whole screen at current zoom.
    const worldHalfW = (W / 2) / zoom;
    const xStart = camX - worldHalfW - 10;
    const xEnd   = camX + worldHalfW + 10;
    const STEP = Math.max(2, 4 / zoom);

    ctx.fillStyle = '#2d1b3d';
    ctx.beginPath();
    ctx.moveTo(toSX(xStart), H);
    for (let x = xStart; x <= xEnd; x += STEP) ctx.lineTo(toSX(x), toSY(terrainY(x)));
    ctx.lineTo(toSX(xEnd), H);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = '#ff6b6b';
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let x = xStart; x <= xEnd; x += STEP) {
      const sx = toSX(x), sy = toSY(terrainY(x));
      if (x === xStart) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    ctx.stroke();

    // Ball — scale visual radius with zoom so it reads as altitude.
    const bsx = toSX(ball.x), bsy = toSY(ball.y);
    const br = ball.r * zoom;
    ctx.fillStyle = diving ? '#ffd23f' : '#ffffff';
    ctx.beginPath();
    ctx.arc(bsx, bsy, br, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Velocity indicator
    if (spd > 10) {
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(bsx, bsy);
      ctx.lineTo(bsx + ball.vx * 0.06 * zoom, bsy - ball.vy * 0.06 * zoom);
      ctx.stroke();
    }

    hud.textContent =
      `L${currentLevel+1}  speed ${spd.toFixed(0)}   best ${bestSpeed.toFixed(0)}   ` +
      `dist ${(maxDist/10).toFixed(0)}m   zoom ${zoom.toFixed(2)}   ` +
      `${ball.grounded ? 'ROLL' : 'FLY'}${diving ? ' ▼' : ''}`;

    if (gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 56px ui-monospace, Menlo, monospace';
      ctx.fillText('GAME OVER', W/2, H/2 - 30);
      ctx.font = '14px ui-monospace, Menlo, monospace';
      ctx.fillText(`distance ${(maxDist/10).toFixed(0)}m   best speed ${bestSpeed.toFixed(0)}`, W/2, H/2 + 20);
      ctx.fillStyle = '#ffd23f';
      ctx.fillText('press SPACE to restart', W/2, H/2 + 50);
      ctx.textAlign = 'start';
      ctx.textBaseline = 'alphabetic';
    }
  }

  // --- Level picker ----------------------------------------------------------
  {
    const picker = document.createElement('div');
    picker.style.cssText =
      'position:fixed;top:8px;right:12px;font-size:12px;' +
      'background:rgba(0,0,0,0.5);padding:6px 8px;border-radius:4px;color:#eee;' +
      'font-family:ui-monospace,Menlo,monospace;';
    picker.innerHTML =
      '<div style="opacity:0.6;margin-bottom:4px">LEVEL</div>' +
      LEVELS.map((l, i) =>
        `<button data-level="${i}" style="display:block;width:160px;margin:2px 0;padding:4px 8px;` +
        `background:#222;color:#eee;border:1px solid #444;cursor:pointer;` +
        `font:inherit;text-align:left">${i+1}. ${l.name}</button>`
      ).join('');
    document.body.appendChild(picker);
    const paint = () => picker.querySelectorAll('button').forEach(b => {
      b.style.background = +b.dataset.level === currentLevel ? '#555' : '#222';
    });
    picker.addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      currentLevel = +btn.dataset.level;
      reset();
      paint();
      btn.blur();   // so next SPACE press isn't swallowed by the button
    });
    paint();
  }

  function frame() {
    const now = performance.now() / 1000;
    let dt = now - lastT; lastT = now;
    if (dt > 0.1) dt = 0.1;
    acc += dt;
    while (acc >= FIXED_DT) { step(FIXED_DT); acc -= FIXED_DT; }
    draw();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
